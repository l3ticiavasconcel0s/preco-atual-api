name: Deploy API

run-name: Deploy API ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to deploy. Example: 0.1.10"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected version
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"

      - name: Build with Gradle
        run: gradle clean build

      - name: Build and export Docker image
        run: |
          APP_NAME="${{ github.event.repository.name }}"
          APP_VERSION="${{ inputs.version }}"

          docker build -t "$APP_NAME:$APP_VERSION" .
          docker save "$APP_NAME:$APP_VERSION" -o image.tar
          chmod 644 image.tar

      - name: Create application directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p "/home/ubuntu/apps/${{ github.event.repository.name }}"

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "image.tar,docker-compose.yml"
          target: "/home/ubuntu/apps/${{ github.event.repository.name }}"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_NAME="${{ github.event.repository.name }}"
            APP_VERSION="${{ inputs.version }}"
            APP_PORT="8081"
            APP_DIR="/home/ubuntu/apps/$APP_NAME"

            docker network inspect app-network >/dev/null 2>&1 \
              || docker network create app-network

            cd "$APP_DIR"
            docker load -i image.tar

            cat > .env << EOF
            APP_NAME=$APP_NAME
            APP_VERSION=$APP_VERSION
            APP_PORT=$APP_PORT
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF

            docker compose -p "$APP_NAME" up -d --force-recreate --no-deps app

            if docker ps --format '{{.Names}}' | grep -qx nginx; then
              docker restart nginx
            fi

            docker compose -p "$APP_NAME" ps
